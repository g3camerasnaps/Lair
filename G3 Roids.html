<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>G3 Roids</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
}

#game{z-index:5;display:none}

#startBtn{
position:fixed;
bottom:20px;
left:20px;
padding:10px 20px;
border:1px solid cyan;
background:black;
color:white;
cursor:pointer;
z-index:10;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>
<canvas id="game"></canvas>

<div id="startBtn">START</div>

<script>

/* CANVAS */

const galaxy=document.getElementById("galaxy")
const gctx=galaxy.getContext("2d")

const game=document.getElementById("game")
const ctx=game.getContext("2d")

function resize(){
galaxy.width=innerWidth
galaxy.height=innerHeight
game.width=innerWidth
game.height=innerHeight
}

window.addEventListener("resize",resize)
resize()

/* STARFIELD */

let stars=[]

for(let i=0;i<600;i++){

stars.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
v:Math.random()*1.2+.3
})

}

function galaxyLoop(){

gctx.fillStyle="black"
gctx.fillRect(0,0,galaxy.width,galaxy.height)

gctx.fillStyle="white"

stars.forEach(s=>{

gctx.fillRect(s.x,s.y,2,2)

s.y+=s.v

if(s.y>galaxy.height){
s.y=0
s.x=Math.random()*galaxy.width
}

})

requestAnimationFrame(galaxyLoop)

}

galaxyLoop()

/* GAME STATE */

let running=false
let paused=false

let ship={
x:0,
y:0,
vx:0,
vy:0,
angle:0
}

let bullets=[]
let asteroids=[]
let particles=[]
let ufo=null

let keys={}

let score=0
let high=parseInt(localStorage.getItem("g7high"))||0

let loopID

/* INPUT */

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key===" ")fire()

if(e.key==="p")paused=!paused

if(e.key==="Escape")exitGame()

})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

/* FIRE */

function fire(){

let speed=8

bullets.push({
x:ship.x,
y:ship.y,
vx:Math.cos(ship.angle)*speed,
vy:Math.sin(ship.angle)*speed,
life:80
})

}

/* ASTEROIDS */

function spawnAsteroid(x,y,size){

let angle=Math.random()*Math.PI*2
let speed=1+Math.random()*1.5

asteroids.push({
x:x,
y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
size:size
})

}

function splitAsteroid(a){

if(a.size>20){

spawnAsteroid(a.x,a.y,a.size/2)
spawnAsteroid(a.x,a.y,a.size/2)

}

}

/* UFO */

function spawnUFO(){

ufo={
x:0,
y:100,
vx:2
}

}

setInterval(()=>{
if(!ufo && running)spawnUFO()
},20000)

/* PARTICLES */

function explode(x,y){

for(let i=0;i<30;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-.5)*6,
vy:(Math.random()-.5)*6,
life:40
})

}

}

/* SCREEN WRAP */

function wrap(o){

if(o.x<0)o.x=game.width
if(o.x>game.width)o.x=0
if(o.y<0)o.y=game.height
if(o.y>game.height)o.y=0

}

/* START */

const startBtn=document.getElementById("startBtn")

function startGame(){

running=true
paused=false

game.style.display="block"

ship.x=game.width/2
ship.y=game.height/2
ship.vx=0
ship.vy=0
ship.angle=0

bullets=[]
asteroids=[]
particles=[]
score=0

for(let i=0;i<5;i++){
spawnAsteroid(Math.random()*game.width,Math.random()*game.height,60)
}

gameLoop()

startBtn.style.display="none"

}

/* EXIT */

function exitGame(){

running=false

cancelAnimationFrame(loopID)

game.style.display="none"
startBtn.style.display="block"

}

/* LOOP */

function gameLoop(){

if(!running)return

if(!paused){

/* SHIP ROTATION */

if(keys["ArrowLeft"])ship.angle-=.08
if(keys["ArrowRight"])ship.angle+=.08

/* THRUST */

if(keys["ArrowUp"]){

ship.vx+=Math.cos(ship.angle)*.15
ship.vy+=Math.sin(ship.angle)*.15

}

/* FRICTION */

ship.vx*=.99
ship.vy*=.99

ship.x+=ship.vx
ship.y+=ship.vy

wrap(ship)

/* BULLETS */

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i]

b.x+=b.vx
b.y+=b.vy
b.life--

wrap(b)

if(b.life<0)bullets.splice(i,1)

}

/* ASTEROIDS */

for(let i=asteroids.length-1;i>=0;i--){

let a=asteroids[i]

a.x+=a.vx
a.y+=a.vy

wrap(a)

/* COLLISION */

for(let j=bullets.length-1;j>=0;j--){

let b=bullets[j]

let dx=b.x-a.x
let dy=b.y-a.y

if(dx*dx+dy*dy<(a.size/2)*(a.size/2)){

explode(a.x,a.y)

splitAsteroid(a)

asteroids.splice(i,1)
bullets.splice(j,1)

score+=20

break

}

}

/* SHIP HIT */

let dx=ship.x-a.x
let dy=ship.y-a.y

if(dx*dx+dy*dy<(a.size/2)*(a.size/2)){

explode(ship.x,ship.y)
exitGame()

}

}

}

/* DRAW */

ctx.fillStyle="black"
ctx.fillRect(0,0,game.width,game.height)

/* SHIP */

ctx.save()
ctx.translate(ship.x,ship.y)
ctx.rotate(ship.angle)

ctx.strokeStyle="white"
ctx.beginPath()
ctx.moveTo(20,0)
ctx.lineTo(-15,-12)
ctx.lineTo(-10,0)
ctx.lineTo(-15,12)
ctx.closePath()
ctx.stroke()

ctx.restore()

/* BULLETS */

ctx.fillStyle="red"

bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,4)
})

/* ASTEROIDS */

ctx.strokeStyle="gray"

asteroids.forEach(a=>{
ctx.beginPath()
ctx.arc(a.x,a.y,a.size/2,0,Math.PI*2)
ctx.stroke()
})

/* UFO */

if(ufo){

ufo.x+=ufo.vx

ctx.strokeStyle="lime"
ctx.strokeRect(ufo.x-20,ufo.y-10,40,20)

if(ufo.x>game.width)ufo=null

}

/* PARTICLES */

for(let i=particles.length-1;i>=0;i--){

let p=particles[i]

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.globalAlpha=p.life/40
ctx.fillStyle="orange"
ctx.fillRect(p.x,p.y,3,3)
ctx.globalAlpha=1

if(p.life<=0)particles.splice(i,1)

}

/* HUD */

ctx.fillStyle="white"
ctx.font="18px Arial"

ctx.fillText("Score: "+score,20,30)
ctx.fillText("High: "+high,20,50)

if(score>high){
high=score
localStorage.setItem("g7high",score)
}

if(paused){

ctx.font="40px Arial"
ctx.fillText("PAUSED",game.width/2-80,game.height/2)

}

loopID=requestAnimationFrame(gameLoop)

}

startBtn.onclick=startGame

</script>

</body>
</html>
